name: Deploy Backend

on:
  push:
    branches: [main]
  workflow_dispatch:

# Never run two deploys at the same time
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Syntax check all source files
        run: |
          find . -name "*.js" -not -path "./node_modules/*" -print0 | xargs -0 -n1 node --check
          echo "All files passed syntax check"

  deploy:
    name: Deploy to EC2
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -e
            NVM_BIN=/root/.nvm/versions/node/v22.16.0/bin
            APP_DIR=/home/ec2-user/scaleup-horizon-backend

            echo "==> Pulling latest main"
            cd "$APP_DIR"
            sudo git fetch origin main
            sudo git reset --hard origin/main

            echo "==> Installing production dependencies"
            sudo env PATH="$NVM_BIN:$PATH" npm install --omit=dev --no-audit --no-fund

            echo "==> Restarting app via PM2"
            sudo env PATH="$NVM_BIN:$PATH" pm2 restart scaleup-horizon-backend --update-env

            echo "==> Waiting for health check (server initializes ML models before listening)"
            for i in $(seq 1 36); do
              if curl -sf http://localhost:5001/api/horizon/health > /dev/null; then
                echo "Health check passed after $((i*5))s"
                exit 0
              fi
              sleep 5
            done
            echo "Health check FAILED after 3 minutes — recent logs:"
            sudo env PATH="$NVM_BIN:$PATH" pm2 logs scaleup-horizon-backend --lines 50 --nostream || true
            exit 1
